                              - paragraph [ref=e141]: אני מאמינה ביכולת של כל אדם לצמוח ולקחת אחריות על חייו, דרך התבוננות כנה ורצון לפעול בהתמדה. להיפרד מסערות הנפש, להיטיב עם עצמנו והסובבים אותנו, לתת את תרומתנו לעולם, מתוך אמונה שהחיים טובים והם ניתנו לנו כמתנה.
